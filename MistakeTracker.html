<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abacus 2.0 Mistake Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#e0f2fe',
                            DEFAULT: '#0ea5e9',
                            dark: '#0369a1',
                        }
                    },
                    animation: {
                        'gradient-x': 'gradient-x 3s linear infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'fade-in-up': 'fadeInUp 0.5s ease-out forwards'
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': {
                                'background-size': '200% 200%',
                                'background-position': 'left center'
                            },
                            '50%': {
                                'background-size': '200% 200%',
                                'background-position': 'right center'
                            }
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' }
                        },
                        'fadeInUp': {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Glassmorphism utility classes */
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* Animated Title Gradient */
        .text-gradient-animate {
            background: linear-gradient(to right, #0ea5e9, #8b5cf6, #0ea5e9);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        /* Abstract Background Blobs */
        .bg-blob {
            position: fixed;
            filter: blur(90px);
            z-index: -1;
            opacity: 0.5;
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #e0f2fe; }
        .blob-2 { bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: #ede9fe; animation-delay: -4s; }
        .blob-3 { top: 40%; left: 30%; width: 40vw; height: 40vw; background: #fce7f3; animation-delay: -2s; }
    </style>
</head>
<body class="min-h-screen p-2 md:p-8 font-sans text-slate-800 relative overflow-x-hidden selection:bg-brand selection:text-white">

    <!-- Animated Background Blobs -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="max-w-5xl mx-auto relative z-10">
        <!-- Header -->
        <div class="glass-panel rounded-2xl border-b-4 border-b-brand p-5 md:p-8 mb-4 md:mb-8 transition-all duration-300 hover:shadow-2xl hover:shadow-brand/20">
            <h1 class="text-3xl md:text-4xl font-extrabold flex items-center gap-3">
                <div class="bg-gradient-to-br from-brand to-indigo-600 w-12 h-12 rounded-xl flex items-center justify-center text-white shadow-lg shadow-brand/30 transform hover:scale-110 transition-transform">
                    <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"></circle><path d="M12 9v4l2 2"></path><path d="M5 3L2 6"></path><path d="m22 6-3-3"></path><path d="M6.38 18.7 4 21"></path><path d="M17.64 18.67 20 21"></path></svg>
                </div>
                <span class="text-gradient-animate tracking-tight">Abacus 2.0 Mistake Tracker</span>
            </h1>
            <p class="text-sm md:text-base text-slate-600 mt-3 font-medium ml-1 md:ml-15">Professional running-total tracker for quick student diagnostics.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-8">
            <!-- Input Section -->
            <div class="md:col-span-1 glass-panel rounded-2xl p-5 md:p-6 h-fit md:sticky md:top-8 transition-all duration-300 hover:shadow-xl hover:shadow-indigo-500/10">
                
                <!-- Decimal Toggle UI -->
                <div class="flex items-center justify-between mb-5 bg-white/60 p-3 rounded-xl border border-white/80 shadow-sm backdrop-blur-sm transition-all hover:border-brand/40">
                    <div class="flex items-center gap-2">
                        <svg class="w-4 h-4 text-brand" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
                        <span class="text-sm font-bold text-slate-700">Decimal Mode</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="decimalToggle" class="sr-only peer" onchange="toggleDecimalMode()">
                        <div class="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-gradient-to-r peer-checked:from-brand peer-checked:to-indigo-500 shadow-inner"></div>
                    </label>
                </div>

                <label class="block text-sm font-bold text-slate-700 mb-1">Enter Sum (Vertical Grid)</label>
                <p class="text-xs text-slate-500 mb-4 font-medium">Paste the numbers exactly as they appear.</p>
                <textarea id="sumInput" rows="6" class="w-full p-4 bg-white/50 border border-white/60 rounded-xl focus:ring-4 focus:ring-brand/20 focus:border-brand outline-none font-mono text-lg md:text-xl tracking-wider resize-y md:h-[350px] shadow-inner transition-all backdrop-blur-sm"></textarea>
                
                <button onclick="generateTimeline()" class="w-full mt-5 bg-gradient-to-r from-brand to-indigo-500 hover:from-brand-dark hover:to-indigo-600 text-white font-bold py-3 px-4 rounded-xl transition-all duration-300 transform hover:-translate-y-1 shadow-lg hover:shadow-brand/40 flex justify-center items-center gap-2">
                    <svg class="w-5 h-5 animate-pulse" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
                    Track Totals
                </button>
                <button onclick="clearAll()" class="w-full mt-3 bg-white hover:bg-slate-50 text-slate-600 font-bold py-3 px-6 rounded-xl transition-all duration-300 border border-slate-200 flex justify-center items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trash2 lucide-trash-2 w-4 h-4" aria-hidden="true"><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path><path d="M3 6h18"></path><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>Clear All</button>
            </div>

            <!-- Output Section (Timeline) -->
            <div class="md:col-span-2 glass-panel rounded-2xl p-5 md:p-10 transition-all duration-300 shadow-lg" id="resultsSection">
                <div id="timelineContainer" class="relative border-l-4 border-slate-300/50 ml-2 md:ml-6 space-y-6 md:space-y-8">
                    <!-- Default State -->
                    <div class="text-slate-400 italic ml-6 font-medium">Enter a sum to generate the tracking timeline.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDecimals = 0;

        function formatNumber(numValInt) {
            if (currentDecimals === 0) {
                return numValInt.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            } else {
                let isNeg = numValInt < 0;
                let absValStr = Math.abs(numValInt).toString().padStart(currentDecimals + 1, '0');
                let intPart = absValStr.slice(0, -currentDecimals) || '0';
                let decPart = absValStr.slice(-currentDecimals);
                let formattedInt = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
                return (isNeg ? '-' : '') + formattedInt + '.' + decPart;
            }
        }

        function toggleDecimalMode() {
            const isDec = document.getElementById('decimalToggle').checked;
            const inputEl = document.getElementById('sumInput');
            
            if(inputEl.value.trim() !== "") {
                generateTimeline();
            }
        }

        // Clears the input and resets the timeline display
        function clearAll() {
            document.getElementById('sumInput').value = "";
            const container = document.getElementById('timelineContainer');
            container.innerHTML = `
                <!-- Default State -->
                <div class="text-slate-400 italic ml-6 font-medium">Enter a sum to generate the tracking timeline.</div>
            `;
            // Optional: Bring the cursor back to the input box automatically
            document.getElementById('sumInput').focus();
        }

        // Detects if adding/subtracting caused a place-value change (carry/borrow)
        function checkDangerZone(prevTotal, currentNum, newTotal) {
            if (prevTotal === 0) return false;
            let prevStr = Math.abs(prevTotal).toString();
            let newStr = Math.abs(newTotal).toString();
            if (prevStr.length !== newStr.length) return true;
            if (prevStr[0] !== newStr[0] && Math.abs(currentNum).toString().length < prevStr.length) return true;
            return false;
        }

        function generateTimeline() {
            const input = document.getElementById('sumInput').value;
            const lines = input.split('\n').map(line => line.trim().replace(/,/g, '')).filter(line => line !== "");
            
            // Safety check: if box is empty, don't run
            if (lines.length === 0) {
                clearAll();
                return;
            }

            const isDecMode = document.getElementById('decimalToggle').checked;
            
            currentDecimals = 0;
            if (isDecMode) {
                // Find maximum decimal places requested by the teacher
                lines.forEach(line => {
                    if (line.includes('.')) {
                        currentDecimals = Math.max(currentDecimals, line.split('.')[1].length);
                    }
                });
                if (currentDecimals === 0) currentDecimals = 2; // Default to 2 decimal places if toggled but none typed
            }

            const multiplier = Math.pow(10, currentDecimals);
            const container = document.getElementById('timelineContainer');
            container.innerHTML = "";

            let abacusTotal = 0;
            let borrowedBase = 0;
            let delay = 0; // For staggered entrance animation

            // Start State (Long Clear)
            container.innerHTML += `
                <div class="relative pl-8 animate-fade-in-up" style="animation-delay: ${delay}ms;">
                    <div class="absolute w-5 h-5 bg-white rounded-full -left-[11px] top-1 border-4 border-slate-300 shadow-md"></div>
                    <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Start</div>
                    <div class="text-slate-500 italic font-medium">Long clear the abacus.</div>
                </div>
            `;

            lines.forEach((line, index) => {
                let numVal;
                if (isDecMode) {
                    const parsed = parseFloat(line);
                    if (isNaN(parsed)) return;
                    numVal = Math.round(parsed * multiplier); // Convert to raw beads
                } else {
                    numVal = parseInt(line);
                    if (isNaN(numVal)) return;
                }

                delay += 50; // stagger animation
                let prevTotal = abacusTotal;
                abacusTotal += numVal;
                
                let borrowedHere = 0;

                // ABACUS NEGATIVE HANDLING
                if (abacusTotal < 0) {
                    let borrowAmount = Math.pow(10, Math.abs(abacusTotal).toString().length);
                    borrowedBase += borrowAmount;
                    abacusTotal += borrowAmount;
                    borrowedHere = borrowAmount;
                }

                let isDangerZone = checkDangerZone(prevTotal, numVal, abacusTotal);
                let dangerBadge = isDangerZone ? `<span class="ml-3 bg-gradient-to-r from-amber-100 to-orange-100 text-amber-700 text-[10px] font-bold px-3 py-1 rounded-full border border-amber-200 uppercase tracking-wider shadow-sm"><svg class="w-3 h-3 inline mr-1 -mt-0.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg> Carry/Borrow</span>` : '';

                let isPositive = numVal >= 0;
                let numColor = isPositive ? 'text-slate-600' : 'text-red-500';
                let sign = isPositive ? '+' : '';
                
                let borrowNote = borrowedHere > 0 ? `<div class="mt-3 text-xs font-bold text-indigo-600 bg-indigo-50/80 border border-indigo-200 p-2.5 rounded-lg shadow-sm backdrop-blur-sm"><svg class="w-4 h-4 inline mr-1 -mt-0.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"></path><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"></path><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"></path><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"></path></svg> Borrowed ${formatNumber(borrowedHere)} on abacus to calculate negative.</div>` : '';

                container.innerHTML += `
                    <div class="relative pl-6 md:pl-8 group animate-fade-in-up" style="animation-delay: ${delay}ms;">
                        <div class="absolute w-5 h-5 ${isDangerZone ? 'bg-gradient-to-br from-amber-300 to-orange-400' : 'bg-gradient-to-br from-brand to-indigo-400'} rounded-full -left-[11px] top-2 border-4 border-white shadow-md transition-transform group-hover:scale-125 group-hover:shadow-lg"></div>
                        
                        <!-- Row Header -->
                        <div class="flex items-center mb-1.5">
                            <span class="text-xs font-bold text-brand uppercase tracking-wider w-16">Row ${index + 1}</span>
                            ${dangerBadge}
                        </div>
                        
                        <!-- Calculation Block -->
                        <div class="glass-card rounded-xl p-3 md:p-4 shadow-sm hover:shadow-lg hover:border-brand/40 transition-all duration-300 transform group-hover:-translate-y-0.5">
                            <div class="flex items-center justify-between">
                                <div class="font-mono text-xl md:text-2xl ${numColor} w-1/3">
                                    ${sign}${formatNumber(numVal)}
                                </div>
                                <div class="text-slate-300 w-1/3 text-center text-sm md:text-base">
                                    <svg class="w-5 h-5 inline group-hover:text-brand transition-colors" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
                                </div>
                                <div class="font-mono text-2xl md:text-3xl font-extrabold text-slate-800 w-1/3 text-right">
                                    ${formatNumber(abacusTotal)}
                                </div>
                            </div>
                            ${borrowNote}
                        </div>
                    </div>
                `;
            });

            delay += 50;

            // "That is..." Final Answer
            if (borrowedBase > 0) {
                if (abacusTotal < borrowedBase) {
                    // Final Answer is Negative: Can't return borrowed base, apply Complement Rule
                    let remainingBeads = (borrowedBase - 1) - abacusTotal;
                    let finalAnswer = -(remainingBeads + 1);
                    
                    container.innerHTML += `
                        <div class="relative pl-6 md:pl-8 mt-8 md:mt-10 animate-fade-in-up" style="animation-delay: ${delay}ms;">
                            <div class="absolute w-7 h-7 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-full -left-[15px] top-1 border-4 border-white shadow-lg flex items-center justify-center">
                                <svg class="w-3 h-3 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"></rect><line x1="8" x2="16" y1="6" y2="6"></line><line x1="16" x2="16" y1="14" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>
                            </div>
                            <div class="glass-card border-t-4 border-t-indigo-500 rounded-xl p-5 md:p-6 shadow-xl hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1">
                                <div class="text-sm font-bold text-indigo-700 uppercase tracking-wider mb-4 flex items-center gap-2">
                                    <svg class="w-4 h-4 inline" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"></path></svg> "That is..." (Complement Rule)
                                </div>
                                <div class="space-y-3 mb-5 text-indigo-950 text-sm md:text-base bg-white/40 p-4 rounded-lg border border-indigo-100">
                                    <div class="flex justify-between border-b border-indigo-200/50 pb-2">
                                        <span class="font-medium">Abacus shows:</span> 
                                        <span class="font-mono font-bold">${formatNumber(abacusTotal)}</span>
                                    </div>
                                    <div class="flex justify-between border-b border-indigo-200/50 pb-2">
                                        <span class="font-medium">Remaining Beads:</span> 
                                        <span class="font-mono text-xs md:text-base">${formatNumber(borrowedBase - 1)} - ${formatNumber(abacusTotal)} = <b class="text-indigo-700">${formatNumber(remainingBeads)}</b></span>
                                    </div>
                                    <div class="pt-2">
                                        <span class="font-mono bg-gradient-to-r from-indigo-500 to-purple-500 text-white px-3 py-1.5 rounded-md text-[10px] md:text-xs font-bold shadow-sm">Ans = -(Remaining Beads + 1)</span>
                                    </div>
                                </div>
                                <div class="font-mono text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-br from-red-500 to-rose-700 tracking-tight mt-2 drop-shadow-sm">
                                    ${formatNumber(finalAnswer)}
                                </div>
                                <div class="text-indigo-600 font-medium italic text-sm mt-5 border-t border-indigo-200/50 pt-4 flex items-center gap-2">
                                    <svg class="w-4 h-4 inline" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg> Short clear the abacus.
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    // Final Answer is Positive: Return the borrowed base physically
                    let finalAnswer = abacusTotal - borrowedBase;
                    
                    container.innerHTML += `
                        <div class="relative pl-6 md:pl-8 mt-8 md:mt-10 animate-fade-in-up" style="animation-delay: ${delay}ms;">
                            <div class="absolute w-7 h-7 bg-gradient-to-br from-teal-400 to-teal-600 rounded-full -left-[15px] top-1 border-4 border-white shadow-lg flex items-center justify-center">
                                <svg class="w-4 h-4 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-2 2"></path><path d="m20 4 2 2"></path><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"></path><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"></path><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"></path><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"></path></svg>
                            </div>
                            <div class="glass-card border-t-4 border-t-teal-500 rounded-xl p-5 md:p-6 shadow-xl hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1">
                                <div class="text-sm font-bold text-teal-700 uppercase tracking-wider mb-4 flex items-center gap-2">
                                    <svg class="w-4 h-4 inline" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"></path></svg> "That is..." (Return Borrowed Base)
                                </div>
                                <div class="space-y-3 mb-5 text-teal-950 text-sm md:text-base bg-white/40 p-4 rounded-lg border border-teal-100">
                                    <div class="flex justify-between border-b border-teal-200/50 pb-2">
                                        <span class="font-medium">Abacus shows:</span> 
                                        <span class="font-mono font-bold">${formatNumber(abacusTotal)}</span>
                                    </div>
                                    <div class="flex justify-between border-b border-teal-200/50 pb-2">
                                        <span class="font-medium">Return borrowed bead:</span> 
                                        <span class="font-mono text-xs md:text-base">${formatNumber(abacusTotal)} - ${formatNumber(borrowedBase)} = <b class="text-teal-700">${formatNumber(finalAnswer)}</b></span>
                                    </div>
                                </div>
                                <div class="font-mono text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-br from-green-500 to-emerald-700 tracking-tight mt-2 drop-shadow-sm">
                                    ${formatNumber(finalAnswer)}
                                </div>
                                <div class="text-teal-700 font-medium italic text-sm mt-5 border-t border-teal-200/50 pt-4 flex items-center gap-2">
                                    <svg class="w-4 h-4 inline" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg> Short clear the abacus.
                                </div>
                            </div>
                        </div>
                    `;
                }
            } else {
                container.innerHTML += `
                    <div class="relative pl-6 md:pl-8 mt-8 md:mt-10 animate-fade-in-up" style="animation-delay: ${delay}ms;">
                        <div class="absolute w-7 h-7 bg-gradient-to-br from-green-400 to-emerald-600 rounded-full -left-[15px] top-1 border-4 border-white shadow-lg flex items-center justify-center">
                            <svg class="w-3 h-3 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg>
                        </div>
                        <div class="glass-card border-t-4 border-t-green-500 rounded-xl p-5 md:p-6 shadow-xl hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1">
                            <div class="text-sm font-bold text-green-700 uppercase tracking-wider mb-3 flex items-center gap-2">
                                <svg class="w-4 h-4 inline" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg> "That is..."
                            </div>
                            <div class="font-mono text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-br from-green-600 to-emerald-800 tracking-tight drop-shadow-sm">
                                ${formatNumber(abacusTotal)}
                            </div>
                            <div class="text-green-700 font-medium italic text-sm mt-5 border-t border-green-200/50 pt-4 flex items-center gap-2">
                                <svg class="w-4 h-4 inline" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg> Short clear the abacus.
                            </div>
                        </div>
                    </div>
                `;
            }

            if (window.innerWidth < 768) {
                setTimeout(() => {
                    document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
            }
        }

        // Check for offline mode styling
        window.addEventListener('load', () => {
            if (!navigator.onLine && typeof tailwind === 'undefined') {
                const warningMsg = document.createElement('div');
                warningMsg.style.cssText = "background: #fef2f2; color: #991b1b; padding: 15px; text-align: center; font-family: sans-serif; font-weight: bold; border-bottom: 2px solid #ef4444;";
                warningMsg.innerText = "⚠️ Network Disconnected: To see colors and layouts offline, please open this file once while connected to the internet so your browser can cache the styling script.";
                document.body.prepend(warningMsg);
            }
        });
    </script>
</body>
</html>
